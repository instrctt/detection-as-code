title: PowerShell Execution with Encoded Command
id: 7c3b1a4e-9f2d-4b6e-8a1c-3e5f7d9b2c4a
status: experimental
description: >
  Detects PowerShell execution using the -EncodedCommand flag (or variations),
  a technique commonly used by attackers to obfuscate malicious commands and
  evade plain-text signature-based detection.
references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://attack.mitre.org/techniques/T1027/
author: instrctt
date: 2026-07-18
tags:
  - attack.execution
  - attack.t1059.001
  - attack.defense_evasion
  - attack.t1027
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\powershell.exe'
    CommandLine|contains:
      - '-EncodedCommand'
      - '-enc '
      - '-e '
      - ' -Enc'
  filter_legit:
    CommandLine|contains: 'C:\Scripts\legitimate-automation.ps1'
  condition: selection and not filter_legit
falsepositives:
  - Legitimate admin scripts using encoding due to character limitations
  - Configuration management tools (e.g., Ansible, SCCM) miscategorized
level: high
